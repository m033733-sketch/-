<!DOCTYPE html>

    .thanks-card p { color: var(--text-muted); font-size: 1.05rem; line-height: 1.7; margin-bottom: 14px; }
    .thanks-contacts { display: flex; flex-direction: column; gap: 10px; margin-top: 32px; align-items: center; }
    .thanks-contacts a { color: var(--green-light); font-size: 15px; }
